name: msq

x-db-env-lms: &db-env-lms
  DATABASE_URL: postgres://${DB_LMS_SVC_USER}:${DB_LMS_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DB_PRODUCT_SCOPED_LOGIN: "true"

# See docker-compose.yml for the cross-repo networking note (not solved here).
# These consume prebuilt images shipped to the server.

services:
  leads-service:
    image: crm-leads-service
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${LEADS_SERVICE_PORT}
      <<: *db-env-lms
      META_SERVICE_URL: http://meta-conversion-api:${META_SERVICE_PORT}
    expose:
      - "${LEADS_SERVICE_PORT}"

  notifications-service:
    image: crm-notifications-service
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${NOTIFICATIONS_SERVICE_PORT}
      <<: *db-env-lms
    expose:
      - "${NOTIFICATIONS_SERVICE_PORT}"

  meta-conversion-api:
    image: crm-meta-conversion-api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${META_SERVICE_PORT}
      <<: *db-env-lms
      LEADS_SERVICE_URL: http://leads-service:${LEADS_SERVICE_PORT}
    expose:
      - "${META_SERVICE_PORT}"
    depends_on:
      leads-service:
        condition: service_started

  lms-web:
    image: crm-lms-web
    restart: unless-stopped
    env_file: .env
    environment:
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3001:3001"
