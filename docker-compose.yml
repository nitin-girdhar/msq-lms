name: platform-lms

# Per-product DB login (P1.2/D8) — read/write only lms/marketing/ext + read-only
# iam/entity/geo. DB_CONTAINER_NAME/DB_NAME point at msq-core's Postgres
# container — see the cross-repo networking note below.
x-db-env-lms: &db-env-lms
  DATABASE_URL: postgres://${DB_LMS_SVC_USER}:${DB_LMS_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DB_PRODUCT_SCOPED_LOGIN: "true"

x-web-public-args: &web-public-args
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${GATEWAY_PORT}}
  API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
  NEXT_PUBLIC_PASSWORD_MIN_LENGTH: ${NEXT_PUBLIC_PASSWORD_MIN_LENGTH:-12}
  NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3000}
  NEXT_PUBLIC_LMS_URL: ${NEXT_PUBLIC_LMS_URL:-http://localhost:3001}
  NEXT_PUBLIC_HR_URL: ${NEXT_PUBLIC_HR_URL:-http://localhost:3002}
  NEXT_PUBLIC_TASK_URL: ${NEXT_PUBLIC_TASK_URL:-http://localhost:3003}
  DB_PRODUCT_SCOPED_LOGIN: "true"

# ── Cross-repo networking (NOT solved here — tracked follow-up) ─────────────
# This repo owns no Postgres container and no api-gateway/identity-service —
# those live in msq-core. Running these services standalone requires either
# (a) an external Docker network joining this repo's compose with
# msq-core's (`docker network create platform-net`; add
# `networks: { default: { name: platform-net, external: true } }` to both
# repos' compose files — not yet wired), or (b) pointing DB_CONTAINER_NAME /
# API_GATEWAY_INTERNAL_URL at msq-core's containers by IP/host in .env.

services:
  leads-service:
    build:
      context: .
      dockerfile: services/leads-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${LEADS_SERVICE_PORT}
      <<: *db-env-lms
      META_SERVICE_URL: http://meta-conversion-api:${META_SERVICE_PORT}
    expose:
      - "${LEADS_SERVICE_PORT}"

  notifications-service:
    build:
      context: .
      dockerfile: services/notifications-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${NOTIFICATIONS_SERVICE_PORT}
      <<: *db-env-lms
    expose:
      - "${NOTIFICATIONS_SERVICE_PORT}"

  meta-conversion-api:
    build:
      context: .
      dockerfile: services/meta-conversion-api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${META_SERVICE_PORT}
      <<: *db-env-lms
      LEADS_SERVICE_URL: http://leads-service:${LEADS_SERVICE_PORT}
    expose:
      - "${META_SERVICE_PORT}"
    depends_on:
      leads-service:
        condition: service_started

  lms-web:
    build:
      context: .
      dockerfile: apps/lms-web/Dockerfile
      args: *web-public-args
    restart: unless-stopped
    env_file: .env
    environment:
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3001:3001"
